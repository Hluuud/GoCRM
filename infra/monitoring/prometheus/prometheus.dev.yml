global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: development
    project: nexcrm

scrape_configs:
  - job_name: 'api-gateway'
    static_configs:
      - targets: ['host.docker.internal:3001']
    metrics_path: '/api/v1/metrics'

  - job_name: 'auth-service'
    static_configs:
      - targets: ['host.docker.internal:3002']
    metrics_path: '/api/v1/metrics'

  - job_name: 'crm-service'
    static_configs:
      - targets: ['host.docker.internal:3003']
    metrics_path: '/api/v1/metrics'

  - job_name: 'finance-service'
    static_configs:
      - targets: ['host.docker.internal:3004']
    metrics_path: '/api/v1/metrics'

  - job_name: 'notification-service'
    static_configs:
      - targets: ['host.docker.internal:3005']
    metrics_path: '/api/v1/metrics'

  - job_name: 'ai-service'
    static_configs:
      - targets: ['host.docker.internal:3006']
    metrics_path: '/api/v1/metrics'

  - job_name: 'workflow-service'
    static_configs:
      - targets: ['host.docker.internal:3007']
    metrics_path: '/api/v1/metrics'

  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['host.docker.internal:9187']

  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['host.docker.internal:9121']

  - job_name: 'rabbitmq-exporter'
    static_configs:
      - targets: ['rabbitmq:15692']
